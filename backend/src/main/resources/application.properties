server.port=8080

# H2 Database (disimpan ke file, bukan RAM)
spring.datasource.url=jdbc:h2:file:./data/monsterdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

# JWT
jwt.secret=MonsterCollectionGameSecretKey2024VeryLongAndSecureKeyForHMACSHA256
jwt.expiration=86400000

logging.level.com.game.projekgame=DEBUG